<!DOCTYPE html>
<html>
<head>
<title>Student Portal</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0e3556;
  color:white;
  text-align:center;
}

.nav {
  background:#002b5c;
  padding:10px;
}
.nav a {
  color:white;
  margin:0 15px;
  text-decoration:none;
}

.container { margin-top:60px; }

.card {
  border:1px solid rgba(255,255,255,0.4);
  padding:20px;
  margin:10px;
  display:inline-block;
  cursor:pointer;
  transition:0.3s;
}
.card:hover {
  transform:scale(1.05);
  background:rgba(255,255,255,0.1);
}

#login { display:none; }

input {
  padding:10px;
  margin:10px;
  width:220px;
}

button {
  padding:10px 20px;
  cursor:pointer;
}

.loader {
  border:4px solid #ccc;
  border-top:4px solid white;
  border-radius:50%;
  width:30px;
  height:30px;
  animation:spin 1s linear infinite;
  margin:auto;
}
@keyframes spin { 100% { transform:rotate(360deg);} }

#spinner { display:none; margin-top:15px; }
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Dashboard</a>
  <a href="term-results.html">Term Results</a>
  <a href="final-results.html">End of Year</a>
</div>

<div class="container">

<h1>SIGN IN</h1>

<div class="card">Parents</div>
<div class="card" onclick="showLogin()">Student</div>
<div class="card">Staff</div>

<div id="login">
<input id="roll" placeholder="Roll Number"><br>
<input id="email" placeholder="Email"><br>
<button onclick="login()">Login</button>

<div id="spinner">
<div class="loader"></div>
<p>Verifying...</p>
</div>
</div>

</div>

<script>
function showLogin(){
 document.getElementById("login").style.display="block";
}

function login(){
 let r=document.getElementById("roll").value;
 let e=document.getElementById("email").value;

 if(r==="1599" && e!==""){
  document.getElementById("spinner").style.display="block";
  setTimeout(()=>{
    window.location.href="term-results.html";
  },1500);
 } else {
  alert("Invalid login");
 }
}
</script>

</body>
</html>
