<!DOCTYPE html>
<html>
<head>
<title>Student Portal</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0e3556;
  color:white;
}

.nav {
  background:#002b5c;
  padding:12px;
  text-align:center;
}

.nav a {
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
}

.container {
  text-align:center;
  margin-top:80px;
}

.card {
  display:inline-block;
  width:200px;
  padding:25px;
  margin:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.3);
  cursor:pointer;
}

.card:hover {
  background:rgba(255,255,255,0.1);
}

#login {
  display:none;
  margin-top:30px;
}

input {
  padding:12px;
  width:250px;
  margin:10px;
  border:none;
}

button {
  padding:12px 25px;
  background:white;
  color:#0e3556;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Dashboard</a>
  <a href="term-results.html">Term Results</a>
  <a href="final-results.html">End of Year</a>
</div>

<div class="container">

<h1>Student Portal Login</h1>

<div class="card">Parents</div>
<div class="card" onclick="showLogin()">Student</div>
<div class="card">Staff</div>

<div id="login">
  <input id="roll" placeholder="Roll Number"><br>
  <input id="email" placeholder="Email"><br>
  <button onclick="login()">Login</button>
</div>

</div>

<script>
function showLogin(){
  document.getElementById("login").style.display="block";
}

function login(){
  let r=document.getElementById("roll").value;
  let e=document.getElementById("email").value;

  if(r==="1599" && e!==""){
    window.location.href="term-results.html";
  } else {
    alert("Invalid login");
  }
}
</script>

</body>
</html>
