<!DOCTYPE html>
<html>
<head>
<title>Student Portal</title>

<style>
body { margin:0; font-family: Arial; background:#0e3556; color:white; text-align:center; }

.nav { background:#002b5c; padding:10px; }
.nav a { color:white; margin:0 15px; text-decoration:none; }

.container { margin-top:60px; }

.card {
  border:1px solid rgba(255,255,255,0.4);
  padding:20px;
  margin:10px;
  display:inline-block;
  cursor:pointer;
}

#login { display:none; }

#spinner { display:none; }
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Dashboard</a>
  <a href="term-results.html">Term Results</a>
  <a href="final-results.html">End of Year</a>
</div>

<div class="container" id="main">

<h1>SIGN IN</h1>

<div class="card">Parents</div>
<div class="card" onclick="showLogin()">Student</div>
<div class="card">Staff</div>

<div id="login">
<input id="roll" placeholder="Roll Number"><br>
<input id="email" placeholder="Email"><br>
<button onclick="login()">Login</button>

<div id="spinner">Loading...</div>
</div>

</div>

<script>
function showLogin(){
 document.getElementById("login").style.display="block";
}

function login(){
 let r=document.getElementById("roll").value;
 let e=document.getElementById("email").value;

 if(r==="1599" && e!==""){
   document.getElementById("spinner").style.display="block";
   setTimeout(()=>{
     window.location.href="term-results.html";
   },1500);
 } else {
   alert("Invalid");
 }
}
</script>

</body>
</html>
